events {}

http {
    include /etc/nginx/mime.types;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name donorpipe.trickybit.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name donorpipe.trickybit.com;

        ssl_certificate     /etc/letsencrypt/live/donorpipe.trickybit.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/donorpipe.trickybit.com/privkey.pem;

        location /api/ {
            proxy_pass http://api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /accounts {
            proxy_pass http://api:8000/accounts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /token {
            proxy_pass http://api:8000/token;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://api:8000/health;
        }

        location /help {
            proxy_pass http://api:8000/help;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
